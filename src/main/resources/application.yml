spring:
  profiles:
    active: dev
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: NEVER
      encoding: UTF-8
      platform: mysql
  security:
    user:
      name: admin
      password: admin123


server:
  port: 9090
  ssl:
    enabled: false
logging:
  file:
    path: logs/
    name: application.log
  logback:
    rollingpolicy:
      max-history: 7

jwt:
  # different expiration time for each token
  expiration:
    access-token: 86400000          # 1 hour
    refresh-token: 604800000       # 7 days
    reset-password: 900000         # 15 minutes
    enable-account: 900000

  # The jwt secret key is used to sign the token.
  secret: 8A22DD3A8C2F5364AA2C6C421F5FD1395DF9B0B3