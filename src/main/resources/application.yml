spring:
  profiles:
    active: @profileActive@
  jpa:
    open-in-view: false
  sql:
    init:
      mode: always
      encoding: UTF-8

server:
  port: 8080

mybatis:
  mapper-locations: classpath:/mapper/**Mapper.xml
  type-aliases-package: com.lczq.zgscweb.mapper

pagehelper:
  helperDialect: mysql
  reasonable: true

logging:
  file:
    path: logs/
    name: application.log
  logback:
    rollingpolicy:
      max-history: 7
